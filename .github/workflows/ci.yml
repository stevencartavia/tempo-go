name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours - catch tempo drift early
  workflow_dispatch:  # Manual trigger

permissions: {}

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.x', '1.26.x']

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cache Go modules
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-

    - name: Download dependencies
      run: go mod download
      env:
        GOVCS: '*:git'

    - name: Run checks and tests
      run: make check

    - name: Build examples
      run: make build_examples

  integration-localnet:
    name: Integration Tests (Localnet)
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25.x'

    - name: Download dependencies
      run: go mod download
      env:
        GOVCS: '*:git'

    - name: Start Tempo node
      run: docker compose up -d

    - name: Wait for Tempo node to be ready
      run: |
        echo "Waiting for Tempo node to start..."
        for i in {1..30}; do
          if curl -s http://localhost:8545 > /dev/null 2>&1; then
            echo "Tempo node is ready!"
            exit 0
          fi
          echo "Attempt $i: Tempo node not ready yet..."
          sleep 2
        done
        echo "Tempo node failed to start"
        docker compose logs
        exit 1

    - name: Run integration tests (localnet lacks fee token liquidity for on-chain tests)
      run: go test -v -run "TestIntegration_NodeConnection|TestIntegration_BuilderValidation|TestIntegration_RoundTrip" -timeout=5m ./tests
      env:
        TEMPO_RPC_URL: http://localhost:8545

    - name: Show Tempo node logs on failure
      if: failure()
      run: docker compose logs

    - name: Stop Tempo node
      if: always()
      run: docker compose down

  integration-devnet:
    name: Integration Tests (Devnet)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.actor != 'dependabot[bot]' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25.x'

    - name: Download dependencies
      run: go mod download
      env:
        GOVCS: '*:git'

    - name: Run integration tests against devnet
      run: go test -v -run TestIntegration -timeout=10m ./tests
      env:
        TEMPO_RPC_URL: ${{ secrets.TEMPO_DEVNET_RPC_URL }}

  integration-testnet:
    name: Integration Tests (Testnet)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.actor != 'dependabot[bot]' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25.x'

    - name: Download dependencies
      run: go mod download
      env:
        GOVCS: '*:git'

    - name: Run integration tests against testnet
      run: go test -v -run TestIntegration -timeout=10m ./tests
      env:
        TEMPO_RPC_URL: ${{ secrets.TEMPO_TESTNET_RPC_URL }}
        # Testnet (moderato) hard-forked T2 → T3 on ~2026-04-21. The default
        # value of TEMPO_HARDFORK in the test harness is "T3", so it's elided
        # here. If a future testnet downgrade or pre-T3 environment is needed,
        # re-add `TEMPO_HARDFORK: T2`.
